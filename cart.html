<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja | Anamac Komputer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { anamac: { 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        body { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">

    <nav class="glass sticky top-0 z-[50] border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 group">
                <div class="bg-anamac-600 p-2 rounded-2xl shadow-lg shadow-anamac-600/30">
                    <span class="text-white font-black text-xl uppercase">A</span>
                </div>
                <h1 class="text-xl font-black tracking-tighter hidden sm:block uppercase italic">Anamac<span class="text-anamac-600">.</span></h1>
            </a>
            
            <div class="flex items-center space-x-3">
                <button id="themeToggle" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all">🌙</button>
                <a href="index.html" class="text-sm font-bold text-slate-500 hover:text-anamac-600 transition-colors">Lanjut Belanja</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 md:py-12 max-w-6xl">
        <div class="flex flex-col lg:flex-row gap-10">
            
            <div class="flex-1">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-3xl font-black tracking-tight">Shopping <span class="text-anamac-600">Cart</span></h2>
                    <span id="itemCountLabel" class="text-xs font-bold uppercase tracking-widest text-slate-400 bg-white dark:bg-slate-800 px-4 py-2 rounded-full border dark:border-slate-700">0 Items</span>
                </div>

                <div id="cartItems" class="space-y-6">
                    </div>
            </div>

            <div class="w-full lg:w-96">
                <div class="glass p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-xl sticky top-28">
                    <h3 class="text-xl font-black mb-6 uppercase tracking-tight">Order Summary</h3>
                    
                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-slate-500 dark:text-slate-400 text-sm">
                            <span>Subtotal</span>
                            <span id="subtotalCost">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-slate-500 dark:text-slate-400 text-sm">
                            <span>Pajak (PPN 11%)</span>
                            <span id="taxCost">Rp 0</span>
                        </div>
                        <div class="border-t border-slate-200 dark:border-slate-700 pt-4 flex justify-between items-center">
                            <span class="font-bold">Total Harga</span>
                            <span id="cartTotal" class="text-2xl font-black text-anamac-600">Rp 0</span>
                        </div>
                    </div>

                    <a href="checkout.html" class="block w-full bg-anamac-600 text-white text-center py-4 rounded-2xl font-black shadow-lg shadow-anamac-600/30 hover:bg-anamac-700 hover:shadow-anamac-600/50 transform active:scale-95 transition-all uppercase text-xs tracking-widest">
                        Lanjut ke Checkout
                    </a>
                    
                    <p class="text-[10px] text-center text-slate-400 mt-6 uppercase tracking-widest font-bold">
                        🔒 Secure Payment via Anamac
                    </p>
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-20 py-12 border-t border-slate-200 dark:border-slate-800 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-[0.2em]">© 2026 Anamac Komputer - Authentic Hardware</p>
    </footer>

    <script>
        // DARK MODE SYNC
        function initTheme() {
            const btn = document.getElementById('themeToggle');
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) document.documentElement.classList.add('dark');
            if (btn) {
                btn.innerText = isDark ? '☀️' : '🌙';
                btn.onclick = () => {
                    const dark = document.documentElement.classList.toggle('dark');
                    localStorage.setItem('theme', dark ? 'dark' : 'light');
                    btn.innerText = dark ? '☀️' : '🌙';
                };
            }
        }

        // CART LOGIC
        let currentCart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCartPage() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';

            if (currentCart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-24 bg-white dark:bg-slate-800/50 rounded-[3rem] border-2 border-dashed border-slate-200 dark:border-slate-800">
                        <span class="text-6xl mb-4 block">🛒</span>
                        <h3 class="text-xl font-black mb-2 uppercase">Keranjang Kosong</h3>
                        <p class="text-slate-500 text-sm mb-8">Sepertinya Anda belum memilih hardware impian.</p>
                        <a href="index.html" class="inline-block bg-anamac-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-anamac-700 transition-all">Mulai Belanja</a>
                    </div>
                `;
                updateSummary(0);
                return;
            }

            let grandTotal = 0;
            let totalItems = 0;

            currentCart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                grandTotal += itemTotal;
                totalItems += item.quantity;

                container.innerHTML += `
                    <div class="group bg-white dark:bg-slate-800 p-4 md:p-6 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-xl transition-all duration-500 flex flex-col md:flex-row items-center gap-6">
                        <div class="w-24 h-24 shrink-0 overflow-hidden rounded-3xl bg-slate-100 dark:bg-slate-900 border dark:border-slate-700">
                            <img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                        </div>

                        <div class="flex-1 text-center md:text-left">
                            <span class="text-[9px] font-black uppercase text-anamac-600 tracking-widest">${item.category}</span>
                            <h4 class="font-bold text-lg line-clamp-1 dark:text-white">${item.name}</h4>
                            <p class="text-slate-400 text-xs font-bold">Rp ${item.price.toLocaleString('id-ID')}</p>
                        </div>

                        <div class="flex items-center bg-slate-100 dark:bg-slate-900 p-1 rounded-2xl border dark:border-slate-700">
                            <button onclick="updateQty(${item.id}, -1)" class="w-10 h-10 flex items-center justify-center font-bold hover:bg-white dark:hover:bg-slate-800 rounded-xl transition-all">-</button>
                            <span class="w-12 text-center font-black text-sm">${item.quantity}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-10 h-10 flex items-center justify-center font-bold hover:bg-white dark:hover:bg-slate-800 rounded-xl transition-all">+</button>
                        </div>

                        <div class="flex items-center gap-6">
                            <p class="font-black text-lg text-anamac-600 min-w-[120px] text-right">Rp ${itemTotal.toLocaleString('id-ID')}</p>
                            <button onclick="removeItem(${item.id})" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all">✕</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('itemCountLabel').innerText = `${totalItems} Items`;
            updateSummary(grandTotal);
        }

        function updateSummary(subtotal) {
            const tax = subtotal * 0.11;
            const total = subtotal + tax;

            document.getElementById('subtotalCost').innerText = `Rp ${subtotal.toLocaleString('id-ID')}`;
            document.getElementById('taxCost').innerText = `Rp ${tax.toLocaleString('id-ID')}`;
            document.getElementById('cartTotal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function updateQty(id, change) {
            const index = currentCart.findIndex(item => item.id === id);
            if (index !== -1) {
                currentCart[index].quantity += change;
                if (currentCart[index].quantity <= 0) {
                    currentCart.splice(index, 1);
                }
                localStorage.setItem('cart', JSON.stringify(currentCart));
                renderCartPage();
            }
        }

        function removeItem(id) {
            currentCart = currentCart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(currentCart));
            renderCartPage();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderCartPage();
        });
    </script>
</body>
</html>
