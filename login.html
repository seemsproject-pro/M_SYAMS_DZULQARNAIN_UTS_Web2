<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Anamac Komputer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { anamac: { 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <div class="fixed top-0 left-0 w-64 h-64 bg-anamac-600/10 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>

    <div class="glass w-full max-w-md p-8 md:p-10 rounded-[2.5rem] border border-white dark:border-slate-800 shadow-2xl relative z-10">
        
        <div class="text-center mb-10">
            <div class="inline-flex bg-anamac-600 p-3 rounded-2xl shadow-lg shadow-anamac-600/30 mb-6">
                <span class="text-white font-black text-2xl uppercase">A</span>
            </div>
            <h2 class="text-3xl font-black tracking-tighter">Welcome <span class="text-anamac-600">Back.</span></h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium">Masuk ke akun Anamac Komputer kamu</p>
        </div>
        
        <form onsubmit="login(event)" class="space-y-5">
            <div class="space-y-2">
                <label class="block text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Alamat Email</label>
                <div class="relative group">
                    <span class="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-anamac-600 transition-colors">📧</span>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-none bg-white dark:bg-slate-800 shadow-sm focus:ring-2 focus:ring-anamac-600 outline-none transition-all text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="block text-[11px] font-black uppercase tracking-[0.2em] text-slate-400">Password</label>
                    <a href="#" class="text-[10px] font-bold text-anamac-600 hover:underline">Lupa Password?</a>
                </div>
                <div class="relative group">
                    <span class="absolute left-4 top-3.5 text-slate-400 group-focus-within:text-anamac-600 transition-colors">🔒</span>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border-none bg-white dark:bg-slate-800 shadow-sm focus:ring-2 focus:ring-anamac-600 outline-none transition-all text-sm">
                </div>
            </div>
            
            <div class="pt-2">
                <button type="submit" 
                    class="w-full bg-anamac-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-anamac-600/20 hover:bg-anamac-700 hover:shadow-anamac-600/40 transform active:scale-95 transition-all uppercase text-xs tracking-widest">
                    Otorisasi Akses
                </button>
            </div>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">
                Belum punya akun? 
                <a href="register.html" class="text-anamac-600 font-black hover:underline ml-1">Daftar Sekarang</a>
            </p>
            <div class="mt-6">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-300 hover:text-slate-500 transition-colors">
                    ← Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
