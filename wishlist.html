<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Anamac Electronics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } }
        }
    </script>
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 antialiased transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-4 shadow-sm sticky top-0 z-50 border-b border-gray-200 dark:border-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-blue-600 dark:text-blue-400">
                ANA<span class="text-gray-800 dark:text-gray-100">MAC.</span>
            </a>
            <div class="space-x-3 md:space-x-5 flex items-center">
                <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition font-semibold">Beranda</a>
                <a href="cart.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition font-semibold">🛒 Cart</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-8 mb-16 min-h-[60vh]">
        <div class="flex items-center space-x-3 mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
            <span class="text-3xl">❤️</span>
            <div>
                <h2 class="text-3xl font-bold">Wishlist Saya</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Daftar produk elektronik impianmu</p>
            </div>
        </div>
        
        <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <p class="text-gray-500 col-span-full text-center py-10 animate-pulse">Memuat wishlist...</p>
        </div>
    </main>

    <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 pt-8 pb-6">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-500 dark:text-gray-400 text-sm">&copy; 2026 Anamac Electronics.</p>
        </div>
    </footer>

    <script>
        // Set tema (Dark/Light) agar seragam dengan index
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        async function loadWishlistPage() {
            // Ambil data produk (dari LocalStorage atau JSON jika kosong)
            let products = JSON.parse(localStorage.getItem('products'));
            if (!products || products.length === 0) {
                const response = await fetch('data/products.json');
                products = await response.json();
                localStorage.setItem('products', JSON.stringify(products));
            }

            // Ambil data wishlist
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            const grid = document.getElementById('wishlist-grid');

            if (wishlist.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <div class="text-6xl mb-4 opacity-50">💔</div>
                        <h3 class="text-xl font-bold mb-2">Wishlist kamu masih kosong</h3>
                        <p class="text-gray-500 dark:text-gray-400 mb-6">Yuk eksplorasi produk dan tambahkan ke wishlist!</p>
                        <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Belanja Sekarang</a>
                    </div>
                `;
                return;
            }

            // Filter produk yang ada di wishlist
            const wishedProducts = products.filter(p => wishlist.includes(p.id));
            grid.innerHTML = '';

            wishedProducts.forEach(product => {
                const card = `
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden group">
                        <div class="relative overflow-hidden">
                            <img src="${product.image}" alt="${product.name}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 line-clamp-1 mb-1">${product.name}</h3>
                            <span class="text-blue-700 dark:text-blue-400 font-extrabold text-lg block mb-4">Rp ${Number(product.price).toLocaleString('id-ID')}</span>
                            
                            <div class="flex space-x-2">
                                <button onclick="removeFromWishlist(${product.id})" class="flex-1 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 font-bold py-2 rounded-xl hover:bg-red-200 dark:hover:bg-red-900/50 transition text-sm">
                                    Hapus
                                </button>
                                <button onclick="moveToCart(${product.id})" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-xl hover:bg-blue-700 transition text-sm">
                                    + Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Fungsi Hapus dari Wishlist
        function removeFromWishlist(id) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            wishlist = wishlist.filter(itemId => itemId !== id);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            loadWishlistPage(); // Render ulang halamannya
        }

        // Fungsi Pindah ke Cart
        function moveToCart(id) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let products = JSON.parse(localStorage.getItem('products')) || [];
            
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) existing.quantity += 1;
            else cart.push({ ...product, quantity: 1 });

            localStorage.setItem('cart', JSON.stringify(cart));
            alert(`${product.name} berhasil dipindahkan ke Keranjang!`);
            
            // Opsional: Langsung hapus dari wishlist setelah masuk cart
            removeFromWishlist(id); 
        }

        document.addEventListener('DOMContentLoaded', loadWishlistPage);
    </script>
</body>
</html>
