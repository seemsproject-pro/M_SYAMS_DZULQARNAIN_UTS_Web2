<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Anamac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <div id="adminLoginScreen" class="flex items-center justify-center min-h-screen bg-gray-900">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
            <div class="text-center mb-6">
                <div class="bg-gray-900 text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl">⚙️</div>
                <h2 class="text-2xl font-bold">Admin Gateway</h2>
            </div>
            <form onsubmit="handleAdminLogin(event)" class="space-y-4">
                <input type="text" id="adminUsername" placeholder="Username (admin)" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-gray-900 outline-none">
                <input type="password" id="adminPassword" placeholder="Password (admin123)" required class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-gray-900 outline-none">
                <button type="submit" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl hover:bg-black transition">Masuk</button>
            </form>
        </div>
    </div>

    <div id="adminDashboardScreen" class="hidden pb-20">
        <nav class="bg-gray-900 text-white p-4 shadow-md sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-wider">⚙️ ANAMAC ADMIN</h1>
                <button onclick="logoutAdmin()" class="bg-red-600 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-red-700">Logout</button>
            </div>
        </nav>

        <main class="container mx-auto p-4 mt-6">
            <h2 class="text-2xl font-bold mb-4">📦 Manajemen Produk</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 h-fit">
                    <h3 id="formTitle" class="font-bold mb-4 border-b pb-2">Tambah Produk</h3>
                    <form id="productForm" onsubmit="saveProduct(event)" class="space-y-3">
                        <input type="hidden" id="productId">
                        <input type="text" id="productName" placeholder="Nama Produk" required class="w-full px-3 py-2 border rounded-lg">
                        <input type="number" id="productPrice" placeholder="Harga" required class="w-full px-3 py-2 border rounded-lg">
                        <select id="productCategory" required class="w-full px-3 py-2 border rounded-lg">
                            <option value="Laptop">Laptop</option>
                            <option value="Tablet">Tablet</option>
                            <option value="Televisi">Televisi</option>
                            <option value="Aksesoris">Aksesoris</option>
                        </select>
                        <input type="url" id="productImage" placeholder="URL Gambar" required class="w-full px-3 py-2 border rounded-lg">
                        <textarea id="productDesc" placeholder="Deskripsi" required rows="2" class="w-full px-3 py-2 border rounded-lg"></textarea>
                        <div class="flex space-x-2">
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">Simpan</button>
                            <button type="button" onclick="resetForm()" class="w-full bg-gray-200 text-gray-800 font-bold py-2 rounded-lg">Batal</button>
                        </div>
                    </form>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 text-sm text-gray-600"><th class="p-3">ID</th><th class="p-3">Info</th><th class="p-3">Harga</th><th class="p-3">Aksi</th></tr>
                        </thead>
                        <tbody id="adminProductTable"></tbody>
                    </table>
                </div>
            </div>

            <h2 class="text-2xl font-bold mb-4 border-t-4 border-gray-300 pt-8">💰 Data Transaksi / Pesanan</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-gray-900 text-white text-sm">
                            <th class="p-3 rounded-tl-lg">Order ID / Tanggal</th>
                            <th class="p-3">Pelanggan</th>
                            <th class="p-3">Total Belanja</th>
                            <th class="p-3">Status</th>
                            <th class="p-3 rounded-tr-lg text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrderTable">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const ADMIN_USER = "admin"; const ADMIN_PASS = "admin123";
        const loginScreen = document.getElementById('adminLoginScreen');
        const dashboardScreen = document.getElementById('adminDashboardScreen');

        // --- AUTH ---
        function checkAdminSession() {
            if (sessionStorage.getItem('isAdminAuth') === 'true') {
                loginScreen.classList.add('hidden');
                dashboardScreen.classList.remove('hidden');
                renderAdminTable(); 
                renderOrderTable(); // Render pesanan
            } else {
                loginScreen.classList.remove('hidden');
                dashboardScreen.classList.add('hidden');
            }
        }
        function handleAdminLogin(e) {
            e.preventDefault();
            if (document.getElementById('adminUsername').value === ADMIN_USER && document.getElementById('adminPassword').value === ADMIN_PASS) {
                sessionStorage.setItem('isAdminAuth', 'true'); checkAdminSession();
            } else alert("Akses Ditolak!");
        }
        function logoutAdmin() { sessionStorage.removeItem('isAdminAuth'); window.location.reload(); }

        // --- CRUD PRODUK (Singkat) ---
        let adminProducts = JSON.parse(localStorage.getItem('products')) || [];
        function renderAdminTable() {
            const tbody = document.getElementById('adminProductTable');
            tbody.innerHTML = adminProducts.map(p => `
                <tr class="border-b">
                    <td class="p-3 text-xs text-gray-400 font-mono">${p.id}</td>
                    <td class="p-3"><p class="font-bold text-sm">${p.name}</p><span class="text-[10px] bg-blue-100 text-blue-700 px-2 rounded-full">${p.category}</span></td>
                    <td class="p-3 font-semibold text-sm">Rp ${p.price.toLocaleString('id-ID')}</td>
                    <td class="p-3 space-x-2">
                        <button onclick="editProduct(${p.id})" class="text-yellow-500 font-bold text-sm">Edit</button>
                        <button onclick="deleteProduct(${p.id})" class="text-red-500 font-bold text-sm">Hapus</button>
                    </td>
                </tr>`).join('');
        }
        function saveProduct(e) {
            e.preventDefault();
            const idInput = document.getElementById('productId').value;
            const newProduct = {
                id: idInput ? parseInt(idInput) : Date.now(),
                name: document.getElementById('productName').value, price: parseInt(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value, image: document.getElementById('productImage').value, description: document.getElementById('productDesc').value
            };
            if (idInput) { const i = adminProducts.findIndex(p => p.id === parseInt(idInput)); if (i !== -1) adminProducts[i] = newProduct; } 
            else adminProducts.push(newProduct);
            localStorage.setItem('products', JSON.stringify(adminProducts)); resetForm(); renderAdminTable();
        }
        function editProduct(id) {
            const p = adminProducts.find(x => x.id === id); if(!p) return;
            document.getElementById('formTitle').innerText = "Edit Produk"; document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name; document.getElementById('productPrice').value = p.price;
            document.getElementById('productCategory').value = p.category; document.getElementById('productImage').value = p.image;
            document.getElementById('productDesc').value = p.description;
        }
        function deleteProduct(id) { if(confirm("Hapus produk?")) { adminProducts = adminProducts.filter(p => p.id !== id); localStorage.setItem('products', JSON.stringify(adminProducts)); renderAdminTable(); } }
        function resetForm() { document.getElementById('productForm').reset(); document.getElementById('productId').value = ''; document.getElementById('formTitle').innerText = "Tambah Produk"; }

        // --- READ DATA PESANAN (BARU) ---
        function renderOrderTable() {
            const tbody = document.getElementById('adminOrderTable');
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            
            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-gray-500">Belum ada pesanan masuk.</td></tr>';
                return;
            }

            // Reverse agar pesanan terbaru di atas
            tbody.innerHTML = orders.reverse().map(o => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3">
                        <p class="font-mono font-bold text-sm text-gray-800">${o.id}</p>
                        <p class="text-xs text-gray-500">${o.date}</p>
                    </td>
                    <td class="p-3">
                        <p class="font-bold text-sm text-gray-800">${o.customerName}</p>
                        <p class="text-xs text-gray-500">${o.phone}</p>
                    </td>
                    <td class="p-3 font-bold text-blue-600">Rp ${o.total.toLocaleString('id-ID')}</td>
                    <td class="p-3">
                        <span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-3 py-1 rounded-full">${o.status || 'Diproses'}</span>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="hapusPesanan('${o.id}')" class="text-red-500 hover:text-red-700 font-bold text-sm">Hapus Data</button>
                    </td>
                </tr>
            `).join('');
        }

        // Fitur hapus riwayat pesanan oleh Admin
        function hapusPesanan(orderId) {
            if(confirm("Yakin ingin menghapus data pesanan ini?")) {
                let orders = JSON.parse(localStorage.getItem('orders')) || [];
                orders = orders.filter(o => o.id !== orderId);
                localStorage.setItem('orders', JSON.stringify(orders));
                renderOrderTable();
            }
        }

        document.addEventListener('DOMContentLoaded', checkAdminSession);
    </script>
</body>
</html>
