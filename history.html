<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan | Anamac Komputer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { anamac: { 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        body { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); }
        .dark .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0b1120] text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300">

    <nav class="glass sticky top-0 z-[50] border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2 group">
                <div class="bg-anamac-600 p-2 rounded-2xl shadow-lg shadow-anamac-600/30">
                    <span class="text-white font-black text-xl uppercase italic">A</span>
                </div>
                <h1 class="text-xl font-black tracking-tighter hidden sm:block uppercase italic">Anamac<span class="text-anamac-600">.</span></h1>
            </a>
            
            <div class="flex items-center space-x-3">
                <button id="themeToggle" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all">🌙</button>
                <a href="index.html" class="bg-anamac-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-anamac-600/20 active:scale-95 transition-all">
                    Lanjut Belanja
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 md:py-12 max-w-4xl">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 gap-4">
            <div class="space-y-1">
                <div class="flex items-center gap-2 text-anamac-600 mb-2">
                    <span class="bg-anamac-600/10 p-2 rounded-lg">📦</span>
                    <span class="text-[10px] font-black uppercase tracking-[0.3em]">Transaction History</span>
                </div>
                <h2 class="text-3xl font-black tracking-tight">Riwayat <span class="text-anamac-600">Pesanan</span></h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm font-medium" id="userGreeting">Memverifikasi data pelanggan...</p>
            </div>
        </div>

        <div id="orderHistoryContainer" class="space-y-8">
            </div>
    </main>

    <footer class="mt-20 py-12 border-t border-slate-200 dark:border-slate-800 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-[0.2em]">© 2026 Anamac Komputer - Authentic Specialist</p>
    </footer>

    <script>
        // SYNC THEME
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.onclick = () => {
                const dark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', dark ? 'dark' : 'light');
                themeBtn.innerText = dark ? '☀️' : '🌙';
            };
        }

        // AUTH & DATA LOGIC
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert("Silakan login untuk melihat riwayat.");
            window.location.href = 'login.html';
        }

        document.getElementById('userGreeting').innerText = `Daftar transaksi untuk akun ${currentUser.name}`;

        const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
        const userOrders = allOrders.filter(o => o.userId === currentUser.email).reverse();
        const container = document.getElementById('orderHistoryContainer');

        if (userOrders.length === 0) {
            container.innerHTML = `
                <div class="text-center py-24 bg-white dark:bg-slate-800/50 rounded-[3rem] border-2 border-dashed border-slate-200 dark:border-slate-800">
                    <span class="text-6xl mb-4 block">🗒️</span>
                    <h3 class="text-xl font-black mb-2 uppercase">Belum Ada Pesanan</h3>
                    <p class="text-slate-500 text-sm mb-8">Anda belum melakukan transaksi hardware apapun.</p>
                    <a href="index.html" class="inline-block bg-anamac-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-anamac-700 transition-all">Mulai Checkout</a>
                </div>
            `;
        } else {
            userOrders.forEach(order => {
                let itemsHtml = order.items.map(item => 
                    `<div class="flex justify-between items-center py-3 border-b border-slate-50 dark:border-slate-700/50 last:border-0">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-100 dark:bg-slate-900 rounded-xl overflow-hidden border dark:border-slate-700">
                                <img src="${item.image}" class="w-full h-full object-cover">
                            </div>
                            <div>
                                <h4 class="font-bold text-sm dark:text-white uppercase tracking-tight">${item.name}</h4>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">${item.quantity} Unit x Rp ${item.price.toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                        <span class="font-black text-xs text-slate-700 dark:text-slate-300">Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
                    </div>`
                ).join('');

                container.innerHTML += `
                    <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden hover:shadow-xl transition-all duration-500">
                        <div class="p-6 md:p-8 bg-slate-50/50 dark:bg-slate-900/30 flex flex-col md:flex-row justify-between gap-4 border-b dark:border-slate-700">
                            <div class="flex items-center gap-4">
                                <div class="bg-anamac-600 text-white p-3 rounded-2xl">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                </div>
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${order.date}</p>
                                    <h3 class="font-mono font-bold text-lg text-anamac-600">${order.id}</h3>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="bg-green-500/10 text-green-500 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-widest border border-green-500/20">
                                    ● ${order.status}
                                </span>
                            </div>
                        </div>

                        <div class="p-6 md:p-8 space-y-4">
                            <div class="bg-slate-50 dark:bg-slate-900/50 rounded-3xl p-6 border dark:border-slate-700">
                                ${itemsHtml}
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Shipping Details</p>
                                    <div class="text-sm font-bold">
                                        <p class="dark:text-white uppercase">${order.customerName}</p>
                                        <p class="text-slate-500 dark:text-slate-400 font-medium leading-relaxed">${order.address}</p>
                                        <p class="text-anamac-600 mt-1">${order.phone}</p>
                                    </div>
                                </div>
                                <div class="md:text-right flex flex-col md:justify-end">
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Grand Total Paid</p>
                                    <p class="text-3xl font-black text-anamac-600 tracking-tighter">Rp ${order.total.toLocaleString('id-ID')}</p>
                                    <p class="text-[9px] font-bold text-slate-400 italic">Termasuk PPN 11% & Ongkir</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="px-8 py-4 bg-slate-50 dark:bg-slate-900/30 border-t dark:border-slate-700 flex justify-end">
                            <button onclick="window.print()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-anamac-600 transition-colors">
                                🖨️ Cetak Invoice
                            </button>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
