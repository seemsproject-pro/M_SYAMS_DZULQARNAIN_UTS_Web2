<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Pesanan - Anamac</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }</script>
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 antialiased transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md p-4 shadow-sm sticky top-0 z-50 border-b border-gray-200 dark:border-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-blue-600 dark:text-blue-400">
                ANA<span class="text-gray-800 dark:text-gray-100">MAC.</span>
            </a>
            <a href="index.html" class="text-gray-500 hover:text-blue-600 font-semibold transition">← Kembali Belanja</a>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-8 mb-16 max-w-4xl">
        <div class="flex items-center space-x-3 mb-8 border-b border-gray-200 dark:border-gray-700 pb-4">
            <span class="text-3xl">📦</span>
            <div>
                <h2 class="text-3xl font-bold">Riwayat Pesanan</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1" id="userGreeting">Memuat data...</p>
            </div>
        </div>

        <div id="orderHistoryContainer" class="space-y-6">
            </div>
    </main>

    <script>
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert("Silakan login untuk melihat riwayat.");
            window.location.href = 'login.html';
        }

        document.getElementById('userGreeting').innerText = `Daftar belanjaan milik ${currentUser.name}`;

        const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
        const userOrders = allOrders.filter(o => o.userId === currentUser.email).reverse(); // Balik agar yang terbaru di atas
        const container = document.getElementById('orderHistoryContainer');

        if (userOrders.length === 0) {
            container.innerHTML = `
                <div class="bg-white dark:bg-gray-800 p-10 rounded-3xl text-center border dark:border-gray-700 shadow-sm">
                    <p class="text-gray-500 mb-4">Belum ada riwayat pesanan.</p>
                    <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700">Belanja Sekarang</a>
                </div>
            `;
        } else {
            userOrders.forEach(order => {
                let itemsHtml = order.items.map(item => 
                    `<div class="flex justify-between text-sm text-gray-600 dark:text-gray-400 mb-1">
                        <span>${item.quantity}x ${item.name}</span>
                        <span>Rp ${(item.price * item.quantity).toLocaleString('id-ID')}</span>
                    </div>`
                ).join('');

                container.innerHTML += `
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border-l-4 border-blue-500 dark:border-gray-700">
                        <div class="flex justify-between items-start border-b border-gray-100 dark:border-gray-700 pb-4 mb-4">
                            <div>
                                <p class="text-xs text-gray-500 mb-1">${order.date}</p>
                                <h3 class="font-bold text-lg font-mono">${order.id}</h3>
                            </div>
                            <span class="bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 text-xs font-bold px-3 py-1 rounded-full">
                                ${order.status}
                            </span>
                        </div>
                        <div class="mb-4">${itemsHtml}</div>
                        <div class="border-t border-gray-100 dark:border-gray-700 pt-4 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <div class="text-sm">
                                <p class="font-semibold text-gray-800 dark:text-gray-200">Dikirim ke:</p>
                                <p class="text-gray-500 dark:text-gray-400 line-clamp-1">${order.customerName} - ${order.address}</p>
                            </div>
                            <div class="text-left sm:text-right">
                                <p class="text-xs text-gray-500">Total Pembayaran</p>
                                <p class="text-xl font-bold text-blue-600 dark:text-blue-400">Rp ${order.total.toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
